# Anima LoRA Training Configuration

[model_arguments]
dit_path = "/path/to/anima-preview.safetensors"
qwen3_path = "/path/to/qwen_3_06b_base.safetensors"
vae_path = "/path/to/qwen_image_vae.safetensors"

[dataset_arguments]
dataset_config = "/path/to/dataset.toml"
cache_latents_to_disk = true
cache_text_encoder_outputs_to_disk = true
# train_data_dir is not needed when using dataset_config

[training_arguments]
output_dir = "./output/my_anima_lora"
output_name = "my_anima_lora"
save_model_as = "safetensors"
max_train_epochs = 50
save_every_n_epochs = 5
logging_dir = "./output/my_anima_lora/logs"
log_with = "tensorboard"
learning_rate = 1e-4
text_encoder_lr = 5e-5
optimizer_type = "AdamW8bit"
optimizer_args = [ "weight_decay=0.01" ]
lr_scheduler = "cosine"
lr_warmup_steps = 0
mixed_precision = "bf16"
gradient_checkpointing = true
flash_attn = false
max_data_loader_n_workers = 4
persistent_data_loader_workers = true
seed = 42

[anima_arguments]
timestep_sample_method = "logit_normal"
discrete_flow_shift = 3.0
weighting_scheme = "logit_normal"

[sample_arguments]
sample_prompts = "./sample_prompts.txt"
sample_every_n_epochs = 5

[network_arguments]
network_module = "networks.lora_anima"
network_dim = 32
network_alpha = 32
network_train_unet_only = true

# To initialize from a LoRA checkpoint (start new training with these weights):
# network_weights = "path\\to\\lora.safetensors"

# To resume training state (start from a saved state folder):
# resume = "path\\to\\saved_state_folder"
